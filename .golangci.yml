version: "2"

linters:
  default: standard
  enable:
    - depguard
  settings:
    depguard:
      rules:
        economy-no-p2p:
          list-mode: lax
          files:
            - "**/internal/economy/**/*.go"
          deny:
            - pkg: "github.com/langoai/lango/internal/p2p"
              desc: "economy packages must not import p2p packages (layer boundary violation)"
        p2p-infra-no-economy:
          list-mode: lax
          files:
            - "**/internal/p2p/discovery/**/*.go"
            - "**/internal/p2p/firewall/**/*.go"
            - "**/internal/p2p/protocol/**/*.go"
            - "**/internal/p2p/agentpool/**/*.go"
          deny:
            - pkg: "github.com/langoai/lango/internal/economy"
              desc: "p2p infrastructure packages must not import economy packages (layer boundary violation)"
            - pkg: "github.com/langoai/lango/internal/wallet"
              desc: "p2p infrastructure packages must not import wallet packages (layer boundary violation)"
        # NOTE: p2p/handshake uses wallet.WalletProvider for cryptographic signing
        # during handshake. This is a known coupling that requires extracting a
        # Signer interface from wallet before it can be enforced. Tracked for future phase.
  exclusions:
    generated: strict
    presets:
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - linters:
          - staticcheck
        text: "SA5011"
        path: _test\.go
