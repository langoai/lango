services:
  lango:
    build: .
    image: lango:latest
    container_name: lango
    restart: unless-stopped
    ports:
      - "18789:18789"
      # - "9000:9000"   # P2P libp2p (uncomment to enable P2P networking, workspaces, and team coordination)
    volumes:
      - lango-data:/home/lango/.lango
      # - lango-workspaces:/home/lango/.lango/workspaces  # Workspace data (uncomment for persistence)
    secrets:
      - lango_config
      - lango_passphrase
    environment:
      - LANGO_PROFILE=default
      # - LANGO_MULTI_AGENT=true        # Enable multi-agent orchestration
      # - LANGO_P2P=true                 # Enable P2P networking
      # - LANGO_AGENT_MEMORY=true        # Enable per-agent persistent memory
      # - LANGO_HOOKS=true               # Enable tool execution hooks
      # - LANGO_SMART_ACCOUNT=true       # Enable ERC-7579 smart account
      # - LANGO_WORKSPACE=true            # Enable P2P collaborative workspaces
      # - LANGO_TEAM=true                  # Enable P2P team coordination
      # - LANGO_ECONOMY=true               # Enable P2P economy (budget, pricing, escrow)

  presidio-analyzer:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: presidio-analyzer
    ports:
      - "5002:5002"
    restart: unless-stopped
    profiles:
      - presidio

secrets:
  lango_config:
    file: ./config.json
  lango_passphrase:
    file: ./passphrase.txt

volumes:
  lango-data:
  lango-workspaces:
