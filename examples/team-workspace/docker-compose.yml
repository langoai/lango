# Team Workspace Integration Test
# 4 Lango agents (Leader + 3 Workers) with Anvil demonstrating
# team formation, task delegation, workspace collaboration, and team budget.

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 30

  setup:
    image: ghcr.io/foundry-rs/foundry:latest
    user: root
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - ./contracts:/contracts:ro
      - ./scripts:/scripts:ro
      - shared:/shared
    entrypoint: ["sh", "/contracts/deploy-team.sh"]
    networks:
      - team-net

  leader:
    image: lango:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      LANGO_CONFIG_FILE: /configs/leader.json
      LANGO_PASSPHRASE_FILE: /secrets/leader-passphrase.txt
      AGENT_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      AGENT_NAME: leader
    volumes:
      - ./configs:/configs:ro
      - ./secrets:/secrets:ro
      - ./docker-entrypoint-team.sh:/usr/local/bin/docker-entrypoint-team.sh:ro
      - shared:/shared:ro
    entrypoint: ["sh", "/usr/local/bin/docker-entrypoint-team.sh"]
    command: ["serve"]
    ports:
      - "18789:18789"
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  worker1:
    image: lango:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      LANGO_CONFIG_FILE: /configs/worker1.json
      LANGO_PASSPHRASE_FILE: /secrets/worker1-passphrase.txt
      AGENT_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      AGENT_NAME: worker1
    volumes:
      - ./configs:/configs:ro
      - ./secrets:/secrets:ro
      - ./docker-entrypoint-team.sh:/usr/local/bin/docker-entrypoint-team.sh:ro
      - shared:/shared:ro
    entrypoint: ["sh", "/usr/local/bin/docker-entrypoint-team.sh"]
    command: ["serve"]
    ports:
      - "18790:18790"
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18790/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  worker2:
    image: lango:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      LANGO_CONFIG_FILE: /configs/worker2.json
      LANGO_PASSPHRASE_FILE: /secrets/worker2-passphrase.txt
      AGENT_PRIVATE_KEY: "0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a"
      AGENT_NAME: worker2
    volumes:
      - ./configs:/configs:ro
      - ./secrets:/secrets:ro
      - ./docker-entrypoint-team.sh:/usr/local/bin/docker-entrypoint-team.sh:ro
      - shared:/shared:ro
    entrypoint: ["sh", "/usr/local/bin/docker-entrypoint-team.sh"]
    command: ["serve"]
    ports:
      - "18791:18791"
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18791/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  worker3:
    image: lango:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      LANGO_CONFIG_FILE: /configs/worker3.json
      LANGO_PASSPHRASE_FILE: /secrets/worker3-passphrase.txt
      AGENT_PRIVATE_KEY: "0x47e179ec197488593b187f80a00eb0da91f1b9d0b13f8733639f19c30a34926a"
      AGENT_NAME: worker3
    volumes:
      - ./configs:/configs:ro
      - ./secrets:/secrets:ro
      - ./docker-entrypoint-team.sh:/usr/local/bin/docker-entrypoint-team.sh:ro
      - shared:/shared:ro
    entrypoint: ["sh", "/usr/local/bin/docker-entrypoint-team.sh"]
    command: ["serve"]
    ports:
      - "18792:18792"
    networks:
      - team-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18792/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

volumes:
  shared:

networks:
  team-net:
    driver: bridge
