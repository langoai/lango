# Escrow Milestones Integration Test
# 2 Lango agents (Alice=Buyer, Bob=Seller) with Anvil demonstrating
# EscrowHubV2, MilestoneSettler, budget allocation, and milestone-based fund release.

services:
  # Local Ethereum node (Foundry Anvil) — deterministic accounts, chainId 31337
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    networks:
      - escrow-net
    healthcheck:
      test: ["CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545"]
      interval: 2s
      timeout: 5s
      retries: 30

  # One-shot setup: deploy MockUSDC + escrow contracts and fund agent addresses
  setup:
    image: ghcr.io/foundry-rs/foundry:latest
    user: root
    depends_on:
      anvil:
        condition: service_healthy
    volumes:
      - ./contracts:/contracts:ro
      - ./scripts:/scripts:ro
      - shared:/shared
    entrypoint: ["sh", "/contracts/deploy-escrow.sh"]
    networks:
      - escrow-net

  alice:
    image: lango:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      LANGO_CONFIG_FILE: /configs/alice.json
      LANGO_PASSPHRASE_FILE: /secrets/alice-passphrase.txt
      AGENT_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      AGENT_NAME: alice
    volumes:
      - ./configs:/configs:ro
      - ./secrets:/secrets:ro
      - ./docker-entrypoint-escrow.sh:/usr/local/bin/docker-entrypoint-escrow.sh:ro
      - shared:/shared:ro
    entrypoint: ["sh", "/usr/local/bin/docker-entrypoint-escrow.sh"]
    command: ["serve"]
    ports:
      - "18789:18789"
    networks:
      - escrow-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18789/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  bob:
    image: lango:latest
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      setup:
        condition: service_completed_successfully
    environment:
      LANGO_CONFIG_FILE: /configs/bob.json
      LANGO_PASSPHRASE_FILE: /secrets/bob-passphrase.txt
      AGENT_PRIVATE_KEY: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
      AGENT_NAME: bob
    volumes:
      - ./configs:/configs:ro
      - ./secrets:/secrets:ro
      - ./docker-entrypoint-escrow.sh:/usr/local/bin/docker-entrypoint-escrow.sh:ro
      - shared:/shared:ro
    entrypoint: ["sh", "/usr/local/bin/docker-entrypoint-escrow.sh"]
    command: ["serve"]
    ports:
      - "18790:18790"
    networks:
      - escrow-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:18790/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

volumes:
  shared:

networks:
  escrow-net:
    driver: bridge
