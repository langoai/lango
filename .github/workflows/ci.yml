name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
          - runner: macos-14
            goos: darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Build
        run: CGO_ENABLED=1 go build ./...

      - name: Test
        run: CGO_ENABLED=1 go test -race -cover ./...

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0

  goreleaser-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true

      - name: Validate .goreleaser.yaml
        run: goreleaser check

  docs-version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ADK version consistency
        run: |
          adk_version=$(grep 'google.golang.org/adk' go.mod | awk '{print $2}')
          echo "go.mod ADK version: $adk_version"
          mismatches=$(grep -rEn "ADK v[0-9]+\.[0-9]+\.[0-9]+" docs/ | grep -v "ADK $adk_version" || true)
          if [ -n "$mismatches" ]; then
            echo "ERROR: docs reference ADK versions that don't match go.mod ($adk_version):"
            echo "$mismatches"
            exit 1
          fi
          echo "All ADK version references in docs match go.mod."
